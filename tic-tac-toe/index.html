<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tic-Tac-Toe</h1>
        
        <!-- Score Board -->
        <div class="scoreboard">
            <div class="score-item">
                <span class="score-label">Player X</span>
                <span class="score-value" id="scoreX">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">Draws</span>
                <span class="score-value" id="scoreDraws">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">Player O</span>
                <span class="score-value" id="scoreO">0</span>
            </div>
        </div>

        <!-- Turn Indicator -->
        <div class="turn-indicator" id="turnIndicator">
            Player <span id="currentPlayer">X</span>'s Turn
        </div>

        <!-- Game Board -->
        <div class="game-board" id="gameBoard">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <!-- Game Status Message -->
        <div class="game-status" id="gameStatus"></div>

        <!-- Reset Button -->
        <button class="reset-btn" id="resetBtn">New Game</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
